# Phase C Warm Start Config
# v6 Section 7.5: ASM free-space approximation for weight initialization
#
# Usage: python scripts/train_phase_c.py --config configs/phase_c_warmstart.yaml
#
# Flow: Warm Start (500 ep) → Stage 1 (BC) → Stage 2 (PDE) → Stage 3 (Full)

model:
  hidden_dim: 128
  num_layers: 4
  num_freqs: 48
  omega_0: 30.0

warm_start:
  enabled: true
  epochs: 500
  lr: 1.0e-3
  n_points: 5000

training:
  epochs: 50000
  lr: 1.0e-3
  lr_min: 1.0e-5
  n_colloc: 20000
  n_phase: 2000
  n_bc: 2000
  device: cuda

curriculum:
  stage1_frac: 0.20
  stage2_frac: 0.40
  lambda_H: 1.0
  lambda_phase: 0.5
  lambda_BC: 0.5
  lambda_I: 0.0

checkpoint:
  save_every: 1000
  dir: checkpoints

red_flag:
  check_every: 500
