# Phase C Small CPU Config (for notebook exploration)
# v6 Section 15.5: Start small, validate structure

model:
  hidden_dim: 64
  num_layers: 3
  num_freqs: 48
  omega_0: 30.0

training:
  epochs: 500
  lr: 1.0e-4
  n_colloc: 2000
  batch_size: 2000
  device: cpu

loss_weights:
  lambda_H: 1.0       # Helmholtz PDE (primary)
  lambda_phase: 0.5    # ASM boundary matching
  lambda_BC: 0.5       # BM boundary condition
  lambda_I: 0.0        # Intensity (disabled in Stage 1)

domain:
  x_min: 0.0
  x_max: 504.0        # 7 * 72 um (7 OPD pitches)
  z_min: 0.0
  z_max: 40.0          # BM2 ~ OPD

physics:
  wavelength_nm: 520
  k_um: 18.37          # 2*pi / (0.520 um * n_medium)
  n_medium: 1.52       # Cover glass / ILD refractive index
