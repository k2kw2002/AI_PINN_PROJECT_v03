# Phase C Full GPU Config (for production training)
# v6 Section 7: Curriculum 3-Stage
#
# CPU experiment insights applied:
#   - n_colloc: 20000 (10K showed CoV=1.05, 20K for safety margin)
#   - n_phase/n_bc: 2000 (proportional to colloc)
#   - warm_start n_points: 10000 (match colloc density)
#
# Usage: python scripts/train_phase_c.py --config configs/phase_c_full_gpu.yaml

model:
  hidden_dim: 128
  num_layers: 4
  num_freqs: 48
  omega_0: 30.0

training:
  epochs: 50000
  lr: 1.0e-3
  lr_min: 1.0e-5
  n_colloc: 20000      # CPU insight: collocation > epochs for avoiding trivial sol
  n_phase: 2000
  n_bc: 2000
  device: cuda

curriculum:
  stage1_frac: 0.20     # 0~10K: boundary learning (L_phase + L_BC)
  stage2_frac: 0.40     # 10K~30K: PDE activation (L_H ramp 0.1→1.0)
  lambda_H: 1.0
  lambda_phase: 0.5
  lambda_BC: 0.5
  lambda_I: 0.0         # Set to 0.3 after LightTools data collected

warm_start:
  enabled: true
  epochs: 500
  lr: 1.0e-3
  n_points: 10000       # Match colloc density

checkpoint:
  save_every: 2000
  dir: checkpoints

red_flag:
  check_every: 1000
