# Phase C Full GPU Config (for production training)
# v6 Section 7: Curriculum 3-Stage

model:
  hidden_dim: 128
  num_layers: 4
  num_freqs: 48
  omega_0: 30.0

training:
  epochs: 50000
  lr: 1.0e-4
  n_colloc: 20000
  batch_size: 10000
  device: cuda
  scheduler: cosine
  warmup_epochs: 1000

loss_weights:
  lambda_H: 1.0
  lambda_phase: 0.5
  lambda_BC: 0.5
  lambda_I: 0.3

curriculum:
  stage1_epochs: 10000   # PDE-only warm-up
  stage2_epochs: 30000   # Add BC + phase
  stage3_epochs: 10000   # Full loss with L_I

domain:
  x_min: 0.0
  x_max: 504.0
  z_min: 0.0
  z_max: 40.0

physics:
  wavelength_nm: 520
  k_um: 18.37
  n_medium: 1.52

warm_start:
  enabled: true
  epochs: 500
  lr: 1.0e-3
  n_points: 5000

checkpoint:
  save_every: 1000
  dir: checkpoints/
  experiment_dir: experiments/
